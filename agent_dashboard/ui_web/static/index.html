<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>agent-dashboard</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <div class="brand"><span class="icon-mount" data-icon="brand-house" data-icon-scale="2"></span> <span>Agentville</span><span class="brand-sub">— 에이전트 마을</span></div>
    <div class="summary" id="summary">마을 문을 여는 중…</div>
    <div class="header-right">
      <span id="usage-bar" class="usage-bar" aria-label="Claude 토큰 사용량" hidden></span>
      <button class="settings-btn" id="theme-toggle" onclick="window.toggleTheme()" title="테마 전환 (라이트/다크)">☀</button>
      <button class="settings-btn" onclick="window.openSettings()" title="펫 외형 설정"><span class="icon-mount" data-icon="cog" data-icon-scale="1"></span></button>
    </div>
    <a href="?preview=motions" class="dev-link" style="font-size:10px;opacity:.5;margin-left:8px;color:inherit;text-decoration:none;">모션 프리뷰</a>
  </header>
  <nav id="town-signpost" aria-label="마을 전환"></nav>
  <main id="root"></main>
  <aside id="settings-root"></aside>
  <div id="gazette" class="gazette" aria-live="polite" style="display:none"></div>
  <footer>
    <span id="conn">●</span>
    <span class="muted">localhost · <code>~/.claude/projects/*</code> + <code>~/.codex/sessions/*</code></span>
  </footer>
  <script src="/static/app.js"></script>
</body>
</html>
